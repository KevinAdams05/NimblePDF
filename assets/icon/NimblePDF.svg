<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4AA3FF"/>
      <stop offset="1" stop-color="#1257D6"/>
    </linearGradient>
    <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E47B4"/>
      <stop offset="1" stop-color="#1F6BE0"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DCEBFF"/>
    </linearGradient>
  </defs>

  <!-- document body with folded top-right corner -->
  <path d="M14,13 Q14,8 19,8 L40,8 L52,20 L52,53 Q52,58 47,58 L19,58 Q14,58 14,53 Z"
        fill="url(#paper)"/>
  <!-- folded corner flap -->
  <path d="M40,8 L52,20 L40,20 Z" fill="url(#fold)"/>

  <!-- motion streaks (speed / nimble) -->
  <g stroke="#FFFFFF" stroke-linecap="round" opacity="0.85">
    <line x1="9"  y1="30" x2="21" y2="30" stroke-width="2.4"/>
    <line x1="11" y1="36" x2="24" y2="36" stroke-width="2.4"/>
    <line x1="14" y1="42" x2="22" y2="42" stroke-width="2.4"/>
  </g>

  <!-- paper airplane pointing up-right -->
  <path d="M47,22 L20,32 L31,34 Z" fill="url(#plane)"/>
  <path d="M47,22 L31,34 L29,46 Z" fill="#BFDBFF"/>
</svg>
